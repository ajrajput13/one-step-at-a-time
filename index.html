<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>One Step at a Time — Your Step 1 Journey</title>
<meta name="theme-color" content="#2FA36B">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="One Step">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#EDF6F0; --bg2:#E6F2EC; --bg3:#F2F9EE;
    --surface:#FFFFFF; --surface-2:#F7FBF8;
    --ink:#25332B; --muted:#6F8378; --faint:#A6B7AE;
    --coral:#2FA36B; --coral-deep:#1E7A50; --coral-soft:#E1F4EA;
    --plum:#2E9E9A; --plum-soft:#DBF1F0;
    --sage:#5BB98C; --sage-soft:#E4F5EC;
    --gold:#E9A02F; --gold-soft:#FBEFD6;
    --sky:#4C9BD6; --sky-soft:#E2EFFA;
    --alert:#DB6A43; --alert-soft:#FBE7DD;
    --line:#E7F0EA; --line-2:#DDE9E1;
    --star:#C98A12;
    --card-jar:linear-gradient(135deg,#F4FAEE,#FBF3E1);
    --card-warm:linear-gradient(120deg,#F1F8EC,#FBF4E2);
    --paper:#FBFDF7;
    --shadow:0 8px 30px rgba(30,90,60,.10);
    --shadow-sm:0 3px 12px rgba(30,90,60,.08);
    --r:20px; --r-sm:14px; --r-lg:28px;
  }
  html[data-theme="dark"]{
    --bg1:#0F1613; --bg2:#0D1A15; --bg3:#111d17;
    --surface:#18241E; --surface-2:#1F2C25;
    --ink:#E7F0EA; --muted:#9DB0A6; --faint:#61756B;
    --coral:#3FBE84; --coral-deep:#57C892; --coral-soft:#1D3229;
    --plum:#45B8B3; --plum-soft:#163029;
    --sage:#5FC496; --sage-soft:#1A3128;
    --gold:#F0B14E; --gold-soft:#2E2717;
    --sky:#5FA9E0; --sky-soft:#16283A;
    --alert:#E67C54; --alert-soft:#33211A;
    --line:#26332C; --line-2:#2F3E35;
    --star:#F0B14E;
    --card-jar:linear-gradient(135deg,#20302400,#1F2C25);
    --card-warm:linear-gradient(120deg,#1E2C22,#25301F);
    --paper:#1C2822;
    --shadow:0 8px 30px rgba(0,0,0,.30);
    --shadow-sm:0 3px 12px rgba(0,0,0,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 600px at 15% -5%, var(--bg3), transparent 60%),
      radial-gradient(1000px 700px at 100% 0%, var(--bg2), transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;
    transition:background .4s ease,color .3s ease;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.01em}
  input,button,select,textarea{font-family:inherit;font-size:16px}
  button{cursor:pointer;border:none;background:none;color:inherit}
  a{color:var(--coral-deep);text-decoration:none}
  ::selection{background:var(--coral-soft)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:230px;flex-shrink:0;padding:26px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
  .brand .logo{color:var(--coral-deep);display:flex}
  .brand .logo svg{width:34px;height:auto}
  .brand .name{font-family:'Fraunces';font-weight:600;font-size:16px;line-height:1.15}
  .brand .sub{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.05em}
  .nav-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r-sm);color:var(--muted);font-weight:700;font-size:15px;transition:.18s;width:100%;text-align:left}
  .nav-btn .ic{font-size:19px;width:22px;text-align:center}
  .nav-btn:hover{background:var(--surface);color:var(--ink)}
  .nav-btn.active{background:var(--surface);color:var(--coral-deep);box-shadow:var(--shadow-sm)}
  .nav-spacer{flex:1}
  .star-chip{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;background:var(--gold-soft);border:1px solid var(--line-2);padding:11px;border-radius:var(--r-sm);font-weight:800;color:var(--star)}
  .star-chip .n{font-size:18px}
  .star-chip.pulse{animation:pulse .5s ease}
  @keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  .side-btn{font-size:12.5px;font-weight:800;color:var(--faint);margin-top:4px;padding:9px;border-radius:10px;text-align:left}
  .side-btn:hover{color:var(--muted);background:var(--surface-2)}

  .main{flex:1;min-width:0;padding:34px 40px 60px;max-width:1040px;margin:0 auto;width:100%}
  section.view{display:none;animation:fade .35s ease}
  section.view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:22px}
  .card+.card{margin-top:18px}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--coral-deep)}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:700}

  .hero{background:linear-gradient(135deg,var(--surface),var(--surface-2));border-radius:var(--r-lg);padding:30px 32px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:26px;align-items:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:radial-gradient(circle,var(--coral-soft),transparent 70%);opacity:.7}
  .hello{font-size:14px;font-weight:800;color:var(--coral-deep);letter-spacing:.02em}
  .hero h1{font-size:34px;margin:6px 0 4px;line-height:1.08}
  .editname{cursor:pointer;border-bottom:2px dotted var(--faint)}
  .encourage{font-size:16px;color:var(--muted);font-weight:600;max-width:44ch;margin-top:8px}
  .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;z-index:1}
  .ring{position:relative;width:150px;height:150px}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:'Fraunces';font-size:30px;line-height:1}
  .ring .pct span{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}

  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
  .stat{background:var(--surface);border-radius:var(--r-sm);padding:16px;box-shadow:var(--shadow-sm);text-align:center}
  .stat .big{font-family:'Fraunces';font-size:26px;line-height:1}
  .stat .lab{font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-top:5px}
  .stat.coral .big{color:var(--coral-deep)} .stat.plum .big{color:var(--plum)}
  .stat.sage .big{color:var(--sage)} .stat.gold .big{color:var(--star)}

  .status-line{margin-top:16px;padding:14px 18px;border-radius:var(--r-sm);font-weight:700;display:flex;gap:10px;align-items:center}
  .status-ahead{background:var(--sage-soft);color:var(--coral-deep)}
  .status-ontrack{background:var(--plum-soft);color:var(--plum)}
  .status-behind{background:var(--gold-soft);color:var(--star)}

  .italy{margin-top:18px;background:var(--card-warm);border:1px dashed var(--line-2);border-radius:var(--r);padding:18px 22px;display:flex;gap:14px;align-items:center}
  .italy .big{font-size:30px}
  .italy .t{font-weight:800}
  .italy .s{font-size:13.5px;color:var(--muted);font-weight:600}

  .page-head{margin-bottom:22px}
  .page-head h2{font-size:28px;margin:4px 0 0}
  .page-head p{color:var(--muted);font-weight:600;margin:6px 0 0;max-width:60ch}

  .task{display:flex;align-items:flex-start;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .task:last-child{border-bottom:none}
  .check{flex-shrink:0;width:24px;height:24px;border-radius:8px;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:1px;background:var(--surface)}
  .check svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:.15s;stroke:#fff}
  .task.done .check{background:var(--sage);border-color:var(--sage)}
  .task.done .check svg{opacity:1;transform:scale(1)}
  .task .label{font-weight:600;font-size:15px;line-height:1.4;flex:1}
  .task.done .label{color:var(--faint);text-decoration:line-through}
  .task .rew{font-size:12px;font-weight:800;color:var(--star);flex-shrink:0;margin-top:2px}
  .task:hover .check{border-color:var(--sage)}

  .bar{height:9px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--coral-deep));transition:width .5s ease}
  .bar.sage > i{background:linear-gradient(90deg,#6ED0AF,var(--sage))}
  .bar.gold > i{background:linear-gradient(90deg,#FFD37A,var(--gold))}

  /* system cards */
  .sys{border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow-sm);overflow:hidden}
  .sys+.sys{margin-top:14px}
  .sys-head{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
  .sys-emoji{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .sys-head .info{flex:1;min-width:0}
  .sys-head .title{font-family:'Fraunces';font-weight:600;font-size:18px}
  .sys-head .meta{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:2px}
  .sys-head .barwrap{margin-top:8px;max-width:340px}
  .sys-head .chev{color:var(--faint);transition:.2s;font-size:18px}
  .sys.open .chev{transform:rotate(90deg)}
  .sys-body{display:none;padding:2px 20px 12px}
  .sys.open .sys-body{display:block}
  .sys-done-badge{background:var(--sage-soft);color:var(--coral-deep);font-weight:800;font-size:12px;padding:4px 10px;border-radius:999px}
  .markall{font-size:12.5px;font-weight:800;color:var(--plum);padding:6px 12px;border-radius:999px;background:var(--plum-soft);margin:8px 0 4px}

  /* schedule */
  .seg{display:inline-flex;background:var(--surface-2);border-radius:999px;padding:4px;gap:4px;margin-bottom:20px}
  .seg button{padding:9px 18px;border-radius:999px;font-weight:800;font-size:14px;color:var(--muted)}
  .seg button.on{background:var(--surface);color:var(--coral-deep);box-shadow:var(--shadow-sm)}
  .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .tl{border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);background:var(--surface);position:relative;overflow:hidden}
  .tl .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .tl .date{font-family:'Fraunces';font-size:17px;margin:4px 0 2px;font-weight:600}
  .tl .cd{font-size:13px;font-weight:800}
  .tl.soft{border-top:4px solid var(--sage)} .tl.soft .cd{color:var(--sage)}
  .tl.d1{border-top:4px solid var(--sky)} .tl.d1 .cd{color:var(--sky)}
  .tl.d2{border-top:4px solid var(--gold)} .tl.d2 .cd{color:var(--star)}
  .tl.d3{border-top:4px solid var(--alert)} .tl.d3 .cd{color:var(--alert)}

  .phase-div{display:flex;align-items:center;gap:14px;margin:26px 0 14px}
  .phase-div h3{font-size:19px;margin:0;white-space:nowrap}
  .phase-div .rule{height:2px;background:var(--line-2);flex:1;border-radius:2px}
  .phase-div .em{font-size:20px}
  .wk{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;border-left:5px solid transparent}
  .wk.current{border-left-color:var(--coral);box-shadow:var(--shadow)}
  .wk.deadline{border-left-color:var(--gold)}
  .wk-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer}
  .wk-num{width:46px;height:46px;border-radius:13px;background:var(--surface-2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
  .wk-num small{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.05em}
  .wk-num b{font-family:'Fraunces';font-size:18px;line-height:1}
  .wk.current .wk-num{background:var(--coral-soft)} .wk.current .wk-num b{color:var(--coral-deep)}
  .wk-head .wt{flex:1;min-width:0}
  .wk-head .wt .tt{font-weight:800;font-size:15.5px}
  .wk-head .wt .dd{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:2px}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .syschip{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;color:var(--ink)}
  .now-badge{background:var(--coral);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:.03em}
  .wk-body{display:none;padding:0 20px 14px 80px}
  .wk.open .wk-body{display:block}
  .wk .chev{color:var(--faint);transition:.2s}
  .wk.open .chev{transform:rotate(90deg)}

  /* calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-nav h3{font-size:22px;margin:0}
  .cal-nav button{width:40px;height:40px;border-radius:12px;background:var(--surface);box-shadow:var(--shadow-sm);font-size:18px;font-weight:800;color:var(--coral-deep)}
  .cal-nav button:disabled{opacity:.3;cursor:default}
  .cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .cal-wdays span{text-align:center;font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.04em}
  .cal-row{background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);padding:8px;margin-bottom:8px}
  .cal-banner{font-size:11.5px;font-weight:800;padding:5px 10px;border-radius:8px;margin-bottom:7px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .cal-banner.empty{background:transparent;color:var(--faint);cursor:default;padding-left:2px}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;font-weight:700;font-size:13px;background:var(--surface-2)}
  .cal-cell.out{background:transparent;color:var(--faint);opacity:.45}
  .cal-cell.plan{background:var(--coral-soft)}
  .cal-cell.today{outline:2.5px solid var(--coral);outline-offset:-2px}
  .cal-cell .dl{position:absolute;bottom:3px;font-size:9px;line-height:1;font-weight:800;padding:1px 4px;border-radius:5px;color:#fff}
  .cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12px;font-weight:700;color:var(--muted)}
  .cal-legend span{display:flex;align-items:center;gap:6px}
  .cal-legend i{width:12px;height:12px;border-radius:4px;display:inline-block}

  /* journal */
  .jadd{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:18px}
  .jadd input,.jadd textarea{width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--line-2);background:var(--surface-2);color:var(--ink);outline:none;margin-bottom:10px;resize:none}
  .jadd input:focus,.jadd textarea:focus{border-color:var(--coral)}
  .jadd .jbtn{background:var(--coral);color:#fff;font-weight:800;padding:11px 20px;border-radius:12px;float:right}
  .jentry{background:var(--paper);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);padding:16px 18px 16px 20px;margin-bottom:12px;position:relative;border-left:4px solid var(--gold);background-image:repeating-linear-gradient(var(--paper) 0 30px,var(--line) 30px 31px)}
  .jentry.resolved{border-left-color:var(--sage);opacity:.72}
  .jentry .jtext{font-family:'Caveat';font-size:23px;font-weight:700;line-height:1.25;color:var(--ink)}
  .jentry.resolved .jtext{text-decoration:line-through}
  .jentry .jnote{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:4px}
  .jentry .jdate{font-size:11px;color:var(--faint);font-weight:800;margin-top:8px;letter-spacing:.03em}
  .jentry .jacts{position:absolute;top:14px;right:14px;display:flex;gap:8px}
  .jentry .jacts button{font-size:12px;font-weight:800;padding:5px 10px;border-radius:999px}
  .jentry .jres{background:var(--sage-soft);color:var(--coral-deep)}
  .jentry .jdel{background:var(--alert-soft);color:var(--alert)}
  .jempty{text-align:center;color:var(--muted);font-weight:600;padding:40px 20px}
  .jempty .big{font-size:38px;margin-bottom:8px}

  /* resources */
  .res-group{margin-bottom:22px}
  .res-group h3{font-size:17px;margin:0 0 12px;display:flex;align-items:center;gap:9px}
  .res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .res{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);transition:.18s;border:1px solid transparent}
  .res:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-2)}
  .res .re{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .res .rn{font-weight:800;font-size:14.5px}
  .res .rd{font-size:12px;color:var(--muted);font-weight:600}
  .res .arrow{margin-left:auto;color:var(--faint)}

  /* rewards */
  .jar{background:var(--card-jar);border-radius:var(--r-lg);padding:26px 30px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}
  .jar .big{font-family:'Fraunces';font-size:46px;line-height:1;color:var(--star)}
  .jar .big .s{font-size:34px}
  .jar .sub{font-weight:700;color:var(--muted);margin-top:4px}
  .jar .earned{font-size:12.5px;font-weight:700;color:var(--faint);margin-top:6px}
  .rtier{margin-top:26px}
  .rtier .th{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rtier .th h3{font-size:19px;margin:0}
  .rtier .th span{font-size:12.5px;color:var(--muted);font-weight:700}
  .rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:12px}
  .reward{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;display:flex;flex-direction:column;gap:9px;position:relative}
  .reward.mega{background:var(--card-warm);border:1px dashed var(--line-2)}
  .reward .rtop{display:flex;align-items:center;gap:11px}
  .reward .remoji{font-size:27px}
  .reward .rname{font-weight:800;font-size:14.5px;line-height:1.2}
  .reward .rcost{font-weight:800;color:var(--star);font-size:13px}
  .reward .rbadge{position:absolute;top:12px;right:12px;font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--plum);background:var(--plum-soft);padding:3px 7px;border-radius:999px}
  .reward .rbtn{margin-top:2px;padding:10px;border-radius:11px;font-weight:800;font-size:14px;transition:.15s;text-align:center}
  .rbtn.ok{background:var(--coral);color:#fff} .rbtn.ok:hover{background:var(--coral-deep)}
  .rbtn.no{background:var(--line);color:var(--faint);cursor:default}
  .rbtn.lock{background:var(--gold-soft);color:var(--star);cursor:default;font-size:12.5px}
  .reward .note{font-size:11.5px;font-weight:700;color:var(--coral-deep)}
  .history{margin-top:26px}
  .hitem{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);font-weight:600}
  .hitem:last-child{border-bottom:none}
  .hitem .he{font-size:20px}
  .hitem .hd{font-size:12px;color:var(--muted);font-weight:700}

    {label:'💛 Breathe — this is a checkpoint, not a verdict', stars:3}];
  if(w.type==='exam') return [
    {label:'⭐ '+w.milestone, stars:100},
    {label:'😴 Sleep well the night before', stars:5},
    {label:'🍀 Trust your prep — you did the work', stars:5}];
  return [
    {label:'📺 Watch high-yield videos: '+s+p, stars:3},
    {label:'🃏 Drill '+s+' Anki cards', stars:3},
    {label:'📖 Read First Aid / Pathoma: '+s, stars:3},
    {label:'✅ One '+s+' UWorld block + review', stars:4},

function weekTitle(w){
  if(w.systems) return sysNames(w)+(w.part?' — '+w.part:'');
  if(w.type==='review') return 'Catch-up & Review';
  if(w.type==='rest') return 'Rest & Recharge';
  if(w.type==='qbank') return w.milestone?('Qbank + '+w.milestone):'Qbank Intensive';
  if(w.type==='weak') return 'Weak-Area Focus';
  if(w.type==='milestone'||w.type==='exam') return w.milestone;
  return 'Study Week';
}
function weekTint(w){
  if(w.systems) return SYS[w.systems[0]].tint;
  if(w.type==='review') return '--plum-soft';
  if(w.type==='rest') return '--sky-soft';
  if(w.type==='qbank') return '--gold-soft';
  if(w.type==='weak') return '--sage-soft';
  return '--coral-soft';

function weekEmoji(w){
  if(w.systems) return w.systems.map(id=>SYS[id].emoji).join('');
  return {review:'🔁',rest:'🎄',qbank:'✅',weak:'🎯',milestone:'🏁',exam:'🎯'}[w.type]||'📘';
}

function renderCalendar(){
  if(!calMonth){ const now=new Date();
    const min=new Date(START.getFullYear(),START.getMonth(),1);
    const max=new Date(2027,3,1);
    let m=new Date(now.getFullYear(),now.getMonth(),1);
    if(m<min)m=min; if(m>max)m=max; calMonth=m; }
  const y=calMonth.getFullYear(), mo=calMonth.getMonth();
  const minM=new Date(START.getFullYear(),START.getMonth(),1), maxM=new Date(2027,3,1);
  const first=new Date(y,mo,1);
  const startSun=new Date(first); startSun.setDate(first.getDate()-first.getDay());
  const lastOfMonth=new Date(y,mo+1,0);
  const now=new Date();
  let rows='';
  let rowSun=new Date(startSun);
  while(rowSun<=lastOfMonth){
    const days=Math.round((rowSun-START)/86400000/7);
    const wnum=days+1;
    const valid=wnum>=1&&wnum<=TOTAL_WEEKS;
    const w=valid?WEEKS.find(x=>x.n===wnum):null;
    const banner=w
      ? `<div class="cal-banner" style="background:var(${weekTint(w)})" data-openwk="${wnum}">Wk ${wnum} · ${weekEmoji(w)} ${weekTitle(w)}</div>`
      : `<div class="cal-banner empty">${valid?'':' '}</div>`;
    let cells='';
    for(let i=0;i<7;i++){
      const d=new Date(rowSun); d.setDate(rowSun.getDate()+i);
      const inMonth=d.getMonth()===mo;
      const today=sameDay(d,now);
      const inPlan=valid&&inMonth;
      let dl='';
      for(const [dd,lab,col] of [[DEADLINES.preStep,'PRE','var(--sky)'],[DEADLINES.soft,'GOAL','var(--sage)'],[DEADLINES.lastPre,'PRE✕','var(--gold)'],[DEADLINES.lastStep,'LAST','var(--alert)']]){
        if(inMonth&&sameDay(d,dd)) dl=`<span class="dl" style="background:${col}">${lab}</span>`;
      }
      cells+=`<div class="cal-cell ${inMonth?'':'out'} ${inPlan?'plan':''} ${today?'today':''}"><span class="dn">${d.getDate()}</span>${dl}</div>`;
    }
    rows+=`<div class="cal-row">${banner}<div class="cal-days">${cells}</div></div>`;
    rowSun=new Date(rowSun); rowSun.setDate(rowSun.getDate()+7);
  }
  const wd=['S','M','T','W','T','F','S'].map(x=>`<span>${x}</span>`).join('');
  const prevDisabled=(new Date(y,mo,1)<=minM), nextDisabled=(new Date(y,mo,1)>=maxM);
  document.getElementById('schedBody').innerHTML=`
    <div class="cal-nav">
      <button ${prevDisabled?'disabled':''} data-calnav="-1">‹</button>
      <h3>${calMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</h3>
      <button ${nextDisabled?'disabled':''} data-calnav="1">›</button>
    </div>
    <div class="cal-wdays">${wd}</div>
    ${rows}
    <div class="cal-legend">
      <span><i style="background:var(--sage)"></i>Target exam</span>
      <span><i style="background:var(--sky)"></i>Pre-step</span>
      <span><i style="background:var(--gold)"></i>Last pre-step</span>
      <span><i style="background:var(--alert)"></i>Final deadline</span>
    </div>
    <div class="footer-note">Tap a week label to jump to its tasks 💛</div>`;
}

document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-view]'); if(nav){ switchView(nav.dataset.view); return; }
  const goto=e.target.closest('[data-goto]'); if(goto){ switchView(goto.dataset.goto); return; }
  const sched=e.target.closest('[data-sched]'); if(sched){ schedView=sched.dataset.sched; renderSchedule(); return; }
  const calnav=e.target.closest('[data-calnav]'); if(calnav){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+ (+calnav.dataset.calnav),1); renderCalendar(); return; }
  const openwk=e.target.closest('[data-openwk]'); if(openwk){ openWeekTarget=+openwk.dataset.openwk; schedView='weeks'; renderSchedule(); setTimeout(()=>{const el=document.querySelector('[data-wk="'+openWeekTarget+'"]'); if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},60); return; }

  const task=e.target.closest('[data-task]');
  if(task){ const k=task.dataset.task; const wasOn=!!state.tasks[k]; toggle('tasks',k);
    if(!wasOn){ const wn=+k.split('::')[0].slice(1); const ti=+k.split('::')[1]; const w=WEEKS.find(x=>x.n===wn); const tasks=genTasks(w);
      burst(e.clientX,e.clientY,tasks[ti].stars);
      const weekDone=tasks.every((t,i)=>state.tasks['w'+wn+'::'+i]);
      if(weekDone){ confetti(); toast('Week '+wn+' complete! 🎉'); } else if(tasks[ti].stars>=20){ confetti(); } }
    pulseStars(); renderActive(); return; }

  const topic=e.target.closest('[data-topic]');
  if(topic){ const k=topic.dataset.topic; const wasOn=!!state.topics[k]; toggle('topics',k);
    if(!wasOn){ const sysId=k.split('::')[0]; const sys=SYS[sysId];
      const nowComplete=sys.topics.every((_,i)=>state.topics[sysId+'::'+i]);
      burst(e.clientX,e.clientY,TOPIC_STAR);
      if(nowComplete){ confetti(); toast(sys.emoji+' '+sys.name+' complete! +'+SYS_BONUS+'⭐'); } }
    pulseStars(); renderReview(); return; }

  const st=e.target.closest('[data-systoggle]'); if(st){ document.querySelector('[data-sys="'+st.dataset.systoggle+'"]').classList.toggle('open'); return; }
  const wt=e.target.closest('[data-wktoggle]'); if(wt){ document.querySelector('[data-wk="'+wt.dataset.wktoggle+'"]').classList.toggle('open'); return; }

  const ma=e.target.closest('[data-markall]');
  if(ma){ const s=SYS[ma.dataset.markall]; const all=s.topics.every((_,i)=>state.topics[s.id+'::'+i]);
    s.topics.forEach((_,i)=>{const k=s.id+'::'+i; if(all) delete state.topics[k]; else state.topics[k]=true;});
    save(); pulseStars(); if(!all){ confetti(); toast(s.emoji+' '+s.name+' complete! +'+SYS_BONUS+'⭐'); } renderReview(); return; }

  const rd=e.target.closest('[data-redeem]'); if(rd){ redeem(rd.dataset.redeem); return; }
  const un=e.target.closest('[data-undo]'); if(un){ state.redemptions.splice(+un.dataset.undo,1); save(); renderRewards(); toast('Refunded ↺'); return; }

  const jr=e.target.closest('[data-jres]'); if(jr){ const m=state.missing.find(x=>x.id===jr.dataset.jres); if(m){ m.resolved=!m.resolved; save(); renderJournal(); if(m.resolved) toast('Conquered 💪'); } return; }
  const jd=e.target.closest('[data-jdel]'); if(jd){ state.missing=state.missing.filter(x=>x.id!==jd.dataset.jdel); save(); renderJournal(); return; }

  if(e.target.closest('#openSettings')) openSettings();
  if(e.target.closest('#themeBtn')) toggleTheme();
});

function addMissing(){
  const t=document.getElementById('jText').value.trim(); if(!t) return;
  const n=document.getElementById('jNote').value.trim();
  state.missing.push({id:'m'+Date.now(), text:t, note:n, date:Date.now(), resolved:false});
  save(); renderJournal(); toast('Added to your journal 📝');
}

function redeem(id){ const r=REWARDS.find(x=>x.id===id); if(!r||starsAvail()<r.cost) return;
  if(r.gate && !(r.gate==='alltopics'?allTopicsDone():allSystemsDone())) return;
  state.redemptions.push({id:r.id,emoji:r.emoji,name:r.name,cost:r.cost,date:Date.now()});
  save(); confetti(); renderRewards(); toast(r.emoji+' Enjoy — you earned it!'); }

function switchView(v){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  renderView(v);
}
function renderView(v){ ({home:renderHome,schedule:renderSchedule,review:renderReview,journal:renderJournal,resources:renderResources,rewards:renderRewards}[v])(); }
function currentView(){ return document.querySelector('.nav-btn.active').dataset.view; }
function renderActive(){ renderView(currentView()); }
function pulseStars(){ const c=document.getElementById('sidebarStars'); c.classList.remove('pulse'); void c.offsetWidth; c.classList.add('pulse'); updateStarChip(); }
function updateStarChip(){ document.querySelector('#sidebarStars .n').textContent=starsAvail(); }

/* ---- theme ---- */
function applyTheme(){ document.documentElement.dataset.theme=state.dark?'dark':''; const b=document.getElementById('themeBtn'); if(b) b.textContent=state.dark?'☀️ Light mode':'🌙 Dark mode'; }
function toggleTheme(){ state.dark=!state.dark; applyTheme(); save(); }

/* ---- modals ---- */
function showModal(html){ document.getElementById('modalContent').innerHTML=html; document.getElementById('modalBg').classList.add('show'); document.body.style.overflow='hidden'; }
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); document.body.style.overflow=''; }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
function openNameEdit(){ showModal(`<h3>What should I call you?</h3><p>Your name lights up the home screen 💛</p>
  <input id="nmeInput" value="${esc(state.name)}" maxlength="24" placeholder="e.g. future Dr. ___"/>
  <div class="row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveName()">Save</button></div>`);
  setTimeout(()=>document.getElementById('nmeInput').focus(),50); }
function saveName(){ const v=document.getElementById('nmeInput').value.trim(); if(v) state.name=v; save(); closeModal(); renderHome(); }
function openSettings(){ const synced=isFirebaseOn();
  showModal(`<h3>Settings</h3><p>${synced?'☁️ Synced across your devices':'💾 Saving on this device'}</p>
    <div class="row" style="margin-bottom:12px"><button class="btn-ghost" onclick="toggleTheme()">${state.dark?'☀️ Light mode':'🌙 Dark mode'}</button><button class="btn-ghost" onclick="openNameEdit()">Change name</button></div>
    <div class="row"><button class="btn-ghost" onclick="closeModal()">Close</button><button class="btn-primary" style="background:var(--alert)" onclick="confirmReset()">Reset progress</button></div>`); }
function confirmReset(){ showModal(`<h3>Start fresh?</h3><p>This clears every check, star, journal note and reward. It can't be undone.</p>
  <div class="row"><button class="btn-ghost" onclick="closeModal()">Keep my progress</button><button class="btn-primary" style="background:var(--alert)" onclick="doReset()">Yes, reset</button></div>`); }
function doReset(){ state={name:state.name,topics:{},tasks:{},redemptions:[],missing:[],dark:state.dark,v:2}; save(); closeModal(); switchView('home'); toast('Fresh start ✨'); }

/* ---- fx ---- */
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
function confetti(){ const colors=['#2FA36B','#5BB98C','#E9A02F','#2E9E9A','#4C9BD6'];
  for(let i=0;i<44;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'vw'; c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${1.4+Math.random()*1.4}s linear ${Math.random()*.4}s forwards`; c.style.opacity=.9; document.body.appendChild(c); setTimeout(()=>c.remove(),3200); } }
function burst(x,y,amount){
  const f=document.createElement('div'); f.className='floatstar'; f.textContent='+'+amount+'⭐'; f.style.left=x+'px'; f.style.top=y+'px';
  f.style.animation='floatUp .9s ease forwards'; document.body.appendChild(f); setTimeout(()=>f.remove(),900);
  for(let i=0;i<7;i++){ const p=document.createElement('div'); p.className='spark'; const ang=Math.random()*6.283, dist=16+Math.random()*22;
    p.style.left=x+'px'; p.style.top=y+'px'; p.style.setProperty('--dx',Math.cos(ang)*dist+'px'); p.style.setProperty('--dy',Math.sin(ang)*dist+'px');
    p.style.animation='sparkOut .7s ease forwards'; document.body.appendChild(p); setTimeout(()=>p.remove(),700); } }

/* ---- storage ---- */
function isFirebaseOn(){ return FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('YOUR_'); }
const LS_KEY='oneStepV2';
function save(){ updateStarChip(); clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ if(docRef){ if(!remoteApplying) docRef.set(state).catch(()=>{}); } else { try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){} } },400); }
function loadLocal(){ try{ const r=localStorage.getItem(LS_KEY); if(r) state=Object.assign(state,JSON.parse(r)); }catch(e){} }
function initStorage(){
  if(isFirebaseOn()){
    try{ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.firestore();
      try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){}
      docRef=db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
      docRef.onSnapshot(snap=>{ if(snap.exists){ remoteApplying=true; state=Object.assign({name:'future doctor',topics:{},tasks:{},redemptions:[],missing:[],dark:false,v:2},snap.data()); remoteApplying=false; applyTheme(); updateStarChip(); renderActive(); } else { docRef.set(state).catch(()=>{}); } },
        err=>{ console.warn('Firestore error, using local:',err); docRef=null; loadLocal(); applyTheme(); boot(); });
      return; }catch(e){ console.warn('Firebase init failed:',e); docRef=null; }
  }
  loadLocal(); applyTheme();
}
function boot(){ updateStarChip(); renderHome(); }
initStorage(); applyTheme(); boot();
</script>
</body>
